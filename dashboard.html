<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            padding: 0;
        }
        ul{
            list-style-type: none;
            display: flex;
            justify-content: space-between;
            margin: 0px;
            padding: 0px;
        }
        li{
            margin: 10px;
        }
        .dashboard-1{
            display: flex;
            justify-content: center;
            gap:8px;
            justify-content:space-around;
            margin: 2px;
             
        }
        @media(max-width:600px){
            .dashboard-1{
            display: flex;  
            justify-content: center;
            gap:8px;
            justify-content:space-around;
            margin: 2px;
            flex-direction: column;
             
        }
        }
        .cards{
            border: 1px solid grey;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }
        form{
            border: 1px solid grey;
            border-radius: 8px;
            padding: 16px;
        }
        input,select,.btn{
            width: 100%;
            margin-top: 8px;
            box-sizing: border-box;
        }
        img{
            width: 50px;
        }
        .logo{
            display: flex;
            align-items: center;
            gap: 8px;
        }
        ul{
            display: flex;
            justify-content: space-between;
            list-style-type: none;
            padding: 0;
            
        }
        a{
           text-decoration: none; 
        }
        a:hover{
            text-decoration: underline;
        }
        nav{
            padding: 10px 5%;
        }
        nav a{
            color: var(--dark);
            font-weight: 600;
        }
        .cards {
            background-color: white;
            box-shadow: 0 8px 24px rgba(15,23,42,0.06);
            padding: 24px 40px;
            border: none; /* remove grey border */
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><div class="logo"><a href="#"><img src="images/wallet.png" alt="logo"></a> <a id="#" class="appname">Expense-Tracker</a></div></li>
            <li><a href="index.html">Logout</a></li>
        </ul>

    </nav>
    <section class="dashboard-1">
        <div class="cards">
            <h2>Income</h2>
            <p>2000 $</p>
        </div>
        <div class="cards">
            <h2>Expense</h2>
            <p>1000 $</p>
        </div>
        <div class="cards">
            <h2>Saving</h2>
            <p>1000$</p>
        </div>
    </section>
    <section>
        <form action="#">
            <h3>Add Expense</h3>
            <label for="category">Category</label>
            <select name="category" id="category">
                <option value="foods">foods</option>
                <option value="clothes">clothes</option>
                <option value="daily Essential">Daily Essential</option>
                <option value="movies">Movies</option>
                <option value="drinks">Drinks</option>
                <option value="others">Others</option>
            </select>
            <label for="price">Price:</label>
            <input type="number" id="price">
            <label for="date">Date: </label>
            <input type="date" id="date">
            <label for="description">Description: </label>
            <input type="text" id="description">
            <button class="btn" onclick="addExpense()" type="button">Add</button>
        </form>

    </section>
    <section>
        <div class="div">
            <p>Transaction list</p>
            <table>
                <thead>
                    <tr>
                    <th>Sr.no</th>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Date</th>
                    <th>price</th>
                    </tr>
                </thead>
                <tbody id="transaction">
                </tbody>
                
            </table>
        </div>

    </section>


<script>
    let count = 1
    function addExpense(){
        let category = document.getElementById("category").value
        let price = document.getElementById("price").value
        let date = document.getElementById("date").value
        let description = document.getElementById("description").value

        let tablebody = document.getElementById("transaction")
        tablebody.innerHTML += "<tr><td>" + count +"</td>"  + "<td>" + category +"</td>"  + "<td>" + description + "</td>"+ "<td>" + date + "</td>" + "<td>" + price + "</td>"+ "</tr>"
        document.getElementById("category").value = ""
        document.getElementById("price").value =""
        document.getElementById("date").value = ""
        document.getElementById("description").value = ""

        count++
        
    }
</script>
</body>
</html>
